# Single source of truth for the RAG pipeline.
# All model ids, paths, hyperparams live here. No magic numbers in code.

seed: 42

paths:
  websites_csv: data/websites.csv
  questions_csv: data/questions.csv
  sample_submission_csv: data/sample_submission.csv
  artifacts_dir: artifacts
  chunks_parquet: artifacts/chunks.parquet
  faiss_index: artifacts/faiss.index
  bm25_pickle: artifacts/bm25.pkl
  submission_csv: submission.csv
  models_dir: models

cleaning:
  min_chars: 50
  dedup_prefix_chars: 500
  drop_hosts:
    - alfabank.by
    - private.auth.alfabank.ru

chunking:
  target_tokens: 512
  overlap_tokens: 64
  tokenizer_model: BAAI/bge-m3   # used only for token counting

embedder:
  model: BAAI/bge-m3
  device: cuda
  batch_size: 64
  query_prefix: ""      # bge-m3 does not use e5-style prefixes
  passage_prefix: ""    # bge-m3 does not use e5-style prefixes
  normalize: true

retrieval:
  dense_top_n: 60
  bm25_top_n: 60
  rrf_k: 60
  fused_top_n: 60

bm25:
  stopwords: russian            # bm25s built-in RU stopword list; null/"" to disable
  stemmer_language: russian     # PyStemmer; stems RU word forms so BM25 matches across inflections
  # NOTE: rebuild the BM25 index after changing these (scripts/build_index.py) — the stored
  # vocabulary is stemmed, so index-time and query-time tokenization must match.

reranker:
  model: BAAI/bge-reranker-v2-m3
  device: cuda
  batch_size: 64
  top_k: 5

grounding:
  context_max_tokens: 3000
  near_dup_prefix_chars: 200

generator:
  backend: openai_api                # "openai_api" (sglang/vllm/oai) | "vllm" | "llama_cpp"
  model: Qwen/Qwen2.5-14B-Instruct-AWQ  # served by sglang on Colab A100 80 GB
  base_url: http://127.0.0.1:30000/v1   # sglang OpenAI-compat endpoint
  api_key: EMPTY                     # sglang ignores by default
  max_concurrency: 32                # parallel HTTP requests in a batch
  request_timeout: 300.0             # per-request timeout, seconds
  temperature: 0.1
  top_p: 0.9
  max_new_tokens: 384                # hard ceiling; references are short, length.py trims the tail
  # Strict Russian grounded-answer prompt. Kept in code, not config — see generation.py.

length:
  # References are short (median ~262 chars / ~37 words; 45% < 200 chars). The metric
  # zeroes any answer >=3x the reference, so keep this tight and TUNE it with the local
  # scorer (scripts/eval_local.py) before trusting it. A wide cap silently zeroes the
  # short-reference half of the set.
  answer_max_chars: 450        # tune via scripts/eval_local.py, do not eyeball
  no_data_phrase: "Нет ответа."   # must match the no-data string in generation.py SYSTEM_PROMPT

eval:
  # Local Recall-L scorer (offline proxy for the leaderboard). See rag/eval/recall_l.py.
  bertscore_lang: ru
  bertscore_model: null          # null -> multilingual BERT chosen from lang
  bertscore_num_layers: null
  length_tokenizer: bert-base-multilingual-cased
  batch_size: 64
  idf: false
